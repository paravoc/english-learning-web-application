<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Danobius — статическое приложение для изучения английского языка, которое открывается прямо через index.html без локального сервера."
    />
    <meta name="theme-color" content="#58cc02" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Danobius</title>
    <link rel="icon" type="image/svg+xml" href="./public/danobius-logo.svg" />
    <link rel="manifest" href="./public/manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css?v=module-paths" />
  </head>
  <body class="is-loading">
    <div id="loading-screen" class="loading-screen" aria-label="Загрузка Danobius">
      <div class="loader-card">
        <div class="loader-orbit">
          <img class="loader-mascot" src="./public/danobius-mascot.svg" alt="" />
        </div>
        <div class="loader-wordmark">danobius</div>
        <p class="loader-subtitle">loading your English path</p>
        <div class="loader-progress" aria-hidden="true">
          <span></span>
        </div>
      </div>
    </div>
    <div id="app"></div>
    <script src="./app.js?v=module-paths"></script>
  </body>
</html>
